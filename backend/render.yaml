services:
  - type: web
    name: doctor-appointment-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: doctor-db
          property: connectionString

databases:
  - name: doctor-db
    databaseName: doctor_appointment
    user: doctor_admin
